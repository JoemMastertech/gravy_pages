    <!-- ─── Motor de Caché Inteligente (Service Worker) ─── -->
    <!-- Intercepts Supabase Storage requests to cache media locally and cut Egress usage -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Calcular el path base dinámicamente para soportar subdirectorios (ej: GitHub Pages)
          const baseDir = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
          const swUrl = baseDir + 'sw.js';
          
          navigator.serviceWorker.register(swUrl, { scope: baseDir })
            .then(registration => {
              console.log('[Media Cache] ✅ Service Worker armado y operando en:', registration.scope);
              // Force immediate activation if waiting
              if (registration.waiting) {
                registration.waiting.postMessage({ type: 'SKIP_WAITING' });
              }
            })
            .catch(err => {
              console.warn('[Media Cache] ⚠️ Fallo la inicialización del SW:', err);
            });

          // Listen for SW updates
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log('[Media Cache] 🔄 Service Worker actualizado.');
          });
        });
      } else {
        console.warn('[Media Cache] ⚠️ Service Workers no soportados en este browser.');
      }
    </script>
